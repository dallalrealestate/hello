<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dallal - Coming Soon | دلال - قريباً</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Dallal Custom Fonts */
        @font-face {
            font-family: 'Akzid';
            src: url('Akzid-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        
        @font-face {
            font-family: 'Alexandria';
            src: url('Alexandria-Medium.ttf') format('truetype');
            font-weight: 500;
            font-style: normal;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --blue: #0000FF;
            --white: #FFFFFF;
            --black: #0A0A0A;
            --muted: #777;
        }

        html, body {
            min-height: 100vh;
        }

        body {
            font-family: 'Akzid', 'DM Sans', sans-serif;
            background: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        body[dir="rtl"] { font-family: 'Alexandria', 'Tajawal', sans-serif; }

        /* background circles */
        body::before {
            content: '';
            position: fixed;
            width: 700px; height: 700px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
            top: -250px; right: -200px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 450px; height: 450px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.04);
            bottom: -150px; left: -80px;
            pointer-events: none;
        }

        /* ── DESKTOP LAYOUT ── */
        .wrapper {
            display: grid;
            grid-template-columns: 1fr 430px;
            gap: 64px;
            max-width: 1020px;
            width: 100%;
            padding: 40px 24px;
            position: relative;
            z-index: 2;
            align-items: center;
        }

        /* LEFT */
        .left {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
        }

        .logo-area { animation: fadeUp 0.8s ease both; }
        .logo-area img { height: 56px; display: block; }

        /* Phone scene */
        .phone-scene {
            position: relative;
            width: 320px;
            height: 520px;
        }

        .phone-main {
            position: absolute;
            left: 0; top: 0;
            width: 265px;
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.3));
            animation: float1 5s ease-in-out infinite;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .phone-second {
            position: absolute;
            right: 0; bottom: 0;
            width: 195px;
            filter: drop-shadow(0 24px 40px rgba(0,0,0,0.25));
            animation: float2 5s ease-in-out infinite;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        .phone-main img,
        .phone-second img { width: 100%; height: auto; display: block; }

        @keyframes float1 {
            0%, 100% { transform: translateY(0px) rotate(-2deg); }
            50%       { transform: translateY(-18px) rotate(-2deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0px) rotate(3deg); }
            50%       { transform: translateY(-13px) rotate(3deg); }
        }

        .phone-main.swapping  { opacity: 0; transform: translateY(12px) rotate(-2deg) !important; }
        .phone-second.swapping { opacity: 0; transform: translateY(12px) rotate(3deg) !important; }

        .tagline {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            font-style: italic;
            letter-spacing: 0.8px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.45);
            animation: fadeUp 0.8s ease 0.6s both;
        }

        /* ── FORM SIDE ── */
        .form-wrap { position: relative; }



        .right {
            background: var(--white);
            border-radius: 22px;
            padding: 42px 38px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.3);
            animation: fadeUp 0.8s ease 0.2s both;
        }

        .form-logo { display: none; }

        h1 {
            font-family: 'Alexandria', 'Tajawal', serif;
            font-size: 38px;
            font-weight: 500;
            color: var(--black);
            line-height: 1.1;
            margin-bottom: 4px;
            text-align: center;
        }
        h1 .en {
            font-family: 'Akzid', 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--muted);
            display: block;
            margin-top: 4px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--black);
            line-height: 1.7;
            margin-bottom: 28px;
            font-weight: 500;
            text-align: center;
        }
        .subtitle .en {
            display: block;
            font-size: 13px;
            color: var(--muted);
            font-weight: 300;
            margin-top: 4px;
        }

        /* lang visibility */
        .lang-en { display: inline; }
        .lang-ar { display: inline; }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(22px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* ════════════════════════════
           MOBILE  ≤ 820px
        ════════════════════════════ */
        @media (max-width: 820px) {

            body {
                align-items: stretch;
                justify-content: flex-start;
                min-height: 100vh;
            }

            .wrapper {
                grid-template-columns: 1fr;
                gap: 0;
                padding: 0;
                max-width: 100%;
                align-items: stretch;
            }

            /* ── TOP BLUE STRIP: phones centered ── */
            .left {
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 32px 24px 12px;
                gap: 0;
            }

            .logo-area { display: none; }

            .phone-scene {
                width: 240px;
                height: 295px;
            }

            .phone-main  { width: 190px; left: 0; top: 0; }
            .phone-second { width: 140px; right: 0; bottom: 0; }

            .tagline {
               font-size: 16px;
                margin-top: 12px;
                display: block !important;
            }

            /* ── WHITE FORM CARD fills rest of screen ── */
            .form-wrap {
                padding: 24px 20px 36px;
            }



            .right {
                border-radius: 20px;
                padding: 28px 22px 32px;
                box-shadow: 0 -4px 40px rgba(0,0,0,0.15);
            }

            h1 { font-size: 34px; }
            body[dir="rtl"] h1 { font-size: 30px; }

            .subtitle { margin-bottom: 22px; }

            .badge { font-size: 11px; }
        }

        /* ── tiny phones ── */
        @media (max-width: 375px) {
            .phone-scene  { width: 200px; height: 245px; }
            .phone-main   { width: 158px; }
            .phone-second { width: 116px; }
            h1 { font-size: 30px; }
            .right { padding: 24px 18px 28px; }
        }
    </style>

<body dir="rtl">
<div class="wrapper">

    <!-- LEFT / TOP on mobile -->
    <div class="left">
        <div class="phone-scene">
            <div class="phone-main" id="phoneMain">
                <img src="arabic_phone.png" alt="Dallal App" id="phoneMainImg">
            </div>
            <div class="phone-second" id="phoneSecond">
                <img src="Ar-white.png" alt="Dallal Intro" id="phoneSecondImg">
            </div>
        </div>

        <div class="tagline">
            <span class="lang-ar">..راحة بال</span>
        </div>
    </div>

    <!-- RIGHT / BOTTOM on mobile -->
    <div class="form-wrap">

        <div class="right">
            <div class="form-logo">
                <img src="logo_transparent.png" alt="Dallal">
            </div>

            <h1>
                قريباً
                <span class="en">Coming Soon</span>
            </h1>

            <p class="subtitle">
                كن أول من يجرب دلال. انضم إلى قائمة الانتظار وسنخبرك عند الإطلاق.
                <span class="en">Be the first to experience Dallal. Join our waitlist and we'll notify you when we launch </span>
            </p>

            <!-- Metafik Lead Next Form -->
            <script src="https://crm.dallal.com.kw/embed/form.js" data-form-id="3f0413b7-f2f8-43c8-a8c1-19304f170a75"></script>

        </div>
    </div>
</div>
